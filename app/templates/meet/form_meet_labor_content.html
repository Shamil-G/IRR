<div id="form_meet_labor"
         data-district="{{ district }}"
         data-districts='{{ districts | tojson | safe }}'
     {% if page %}
         data-path-photo='{{ path_photo | tojson | safe }}'
     {% endif %}
     style="overflow: auto" class="scroll-x-y">
    <form class="irr-form" method="post" enctype="multipart/form-data">

        {% if prot_num %}
        <div class="form-row">
            <label for="prot_num">{{ res_value('PROTOCOL_NUM') }}</label>
            <input id="prot_num" style="font-size: 16px; background: inherit; border:none"
                   type="text" value="{{ prot_num }}" readonly>
            <input type="hidden" name="prot_num" value="{{ prot_num }}">
        </div>
        {% endif %}


        <div class="form-row">
            <label for="date_irr">{{ res_value('MEET_DATE') }}</label>
            <input id="date_irr" class="input_d" style="max-width: 132px" type="date" name="date_irr" value="{{ date_irr.strftime('%Y-%m-%d') if date_irr else '' }}" {%if not prot_num%}required{%endif%}>
        </div>

        <div class="form-row">
            <label for="region-select">{{ res_value('SELECT_REGION') }}</label>
            <select id="region-select" class="input_s" style="min-width: 274px" name="rfbn_id" {%if not prot_num%}required{%endif%}>
                {% for code, region in regions.items() %}
                <option value="{{ code[:2] }}"
                        {% if code[:2]==rfbn_id %}selected{% endif %}>
                    {{ region.legacy_name }}
                </option>
                {% endfor %}
            </select>
        </div>

        <div class="form-row">
            <label for="district-select">{{ res_value('SELECT_RAYON') }}</label>
            <select id="district-select" name="district" style="min-width: 444px" class="input_s hidden" {%if not prot_num%}required{%endif%}>
                <option value="{{ district }}" selected hidden></option>
            </select>
        </div>

        <div class="form-row">
            <label for="count-participient">{{ res_value('COUNT_PARTICIPIENT') }}</label>
            <input id="count-participient" class="input_s" style="max-width: 80px" type="number" name="cnt_total" min="1" value="{{ cnt_total or '' }}" {%if not prot_num%}required{%endif%}>
        </div>

        <div class="form-row">
            <label for="count-women">{{ res_value('COUNT_WOMEN') }}</label>
            <input id="count-women" class="input_s" style="max-width: 80px" type="number" name="cnt_women" min="0" value="{{ cnt_women or '' }}" {%if not prot_num%}required{%endif%}>
        </div>

        <div class="form-row">
            <label for="speaker-fio">{{ res_value('SPEAKER_FIO') }}</label>
            <input id="speaker-fio" class="input_s" type="text" name="speaker" value="{{ speaker }}" {%if not prot_num%}required{%endif%}>
        </div>

        <div class="form-row">
            <label for="meeting-format">{{ res_value('MEETING_FORMAT') }}</label>
            <select id="meeting-format" class="input_s" style="max-width: 176px" name="meeting_format" value="{{ meeting_format }}" {%if not prot_num%}required{%endif%}>
                <option value="">{{ res_value('SELECT_FORMAT') }}</option>
                <option value="offline" {% if "offline" in meeting_format %}selected{% endif %}>{{ res_value('ON_PLACE_FORMAT') }}</option>
                <option value="online" {% if "online" in meeting_format %}selected{% endif %}>{{ res_value('ON_LINE_FORMAT') }}</option>
            </select>
        </div>

        <div class="form-row">
            <label>{{ res_value('NAME_PARTNERS') }}</label>
            <div style="display: flex; flex-direction: column; gap: 6px; border: 1px solid; max-width: 720px">
                {% for partner in list_partners %}
                <label>
                    <input type="checkbox" name="partners" value="{{partner}}"
                           {% if partner in partners %}checked{% endif %}>
                    {{ partner }}
                </label>
                {% endfor %}
            </div>
        </div>

        <div class="form-row">
            <label for="category-subject">{{ res_value('CATEGORY_SUBJECT') }}</label>
            <select id="category-subject" class="input_s" style="max-width: 192px" name="category" {%if not prot_num%}required{%endif%}>
                <option value="">{{ res_value('CATEGORY_SELECT') }}</option>
                <option value="large" {% if "large" in category %}selected{% endif %}>{{ res_value('CATEGORY_LARGE') }}</option>
                <option value="medium" {% if "medium" in category %}selected{% endif %}>{{ res_value('CATEGORY_MIDDLE') }}</option>
                <option value="small" {% if "small" in category %}selected{% endif %}>{{ res_value('CATEGORY_SMALL') }}</option>
            </select>
        </div>

        <div class="form-row">
            <label for="bin-organization">{{ res_value('BIN_ORGANIZATION') }}</label>
            <input id="bin-organization" class="input_s" style="max-width: 140px" name="bin"
                   type="text" maxlength="12" pattern="\d{12}" inputmode="numeric" title="Введите ровно 12 цифр"
                   oninput="this.value = this.value.replace(/\D/g, '')" {%if not prot_num%}required{%endif%} value="{{ bin }}">
        </div>

        <div class="form-row">
            <label for="name-organization">{{ res_value('NAME_ORGANIZATION') }}</label>
            <input id="name-organization" class="input_s" type="text" name="organization_name" style="background: transparent; border: none; outline: none; box-shadow: none; min-width: 880px" value="{{ organization_name or '' }}">
        </div>

        <div class="form-row">
            <span>{{ res_value('PHOTO_REPORT') }}</span>
            <div style="display: flex; flex-direction: column; gap: 6px">
                <label for="path_photo" class="button" style="max-width: 220px">
                    📷 {{ res_value('PHOTO_SELECT') }}
                </label>
                <input type="file" id="path_photo" name="path_photo" accept="image/*" multiple hidden>
                <div id="photo-file-names" class="file-names"></div>
            </div>
        </div>

        <div class="form-row form-actions">
            <button type="submit">{{ res_value('BUTTON_SAVE') }}</button>
            <span style="white-space: pre-line; padding: 0px; margin: 0px; font-weight: bold; font-size: 14px; line-height: 0.8; color: green">{{ message }}</span>
        </div>

    </form>
</div>
